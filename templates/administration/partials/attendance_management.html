{% load i18n %}
<!-- Attendance Management Partial -->

<div class="management-header">
    <h3 class="management-title"><i class="bi bi-calendar-check me-2"></i>{% trans "Davomat Boshqaruvi" %}</h3>
    <button class="btn btn-action btn-action-success" onclick="exportAttendance()">
        <i class="bi bi-download"></i> {% trans "Excel ga eksport" %}
    </button>
</div>

<!-- Filter Panel -->
<div class="filter-panel">
    <div class="row g-3">
        <div class="col-md-4">
            <select id="attendanceClassFilter" class="form-select">
                <option value="">{% trans "Barcha sinflar" %}</option>
            </select>
        </div>
        <div class="col-md-4">
            <input type="date" id="attendanceDateFilter" class="form-control">
        </div>
        <div class="col-md-4">
            <select id="attendanceStatusFilter" class="form-select">
                <option value="">{% trans "Barcha holatlar" %}</option>
                <option value="present">{% trans "Kelgan" %}</option>
                <option value="absent">{% trans "Kelmagan" %}</option>
                <option value="late">{% trans "Kechikkan" %}</option>
            </select>
        </div>
    </div>
</div>

<!-- Attendance Table -->
<div class="modern-table">
    <table class="table">
        <thead>
            <tr>
                <th>{% trans "O'quvchi" %}</th>
                <th>{% trans "Sinf" %}</th>
                <th>{% trans "Sana" %}</th>
                <th>{% trans "Holat" %}</th>
                <th style="width: 150px;">{% trans "Harakatlar" %}</th>
            </tr>
        </thead>
        <tbody id="attendanceTableBody">
            <tr>
                <td colspan="5" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">{% trans "Yuklanmoqda..." %}</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<nav id="attendancePagination" class="pagination-modern mt-3"></nav>

<script>
    window.loadAttendance = function(page = 1) {
        const classId = document.getElementById('attendanceClassFilter')?.value || '';
        const date = document.getElementById('attendanceDateFilter')?.value || '';
        const status = document.getElementById('attendanceStatusFilter')?.value || '';

        fetch(`{% url 'attendance_list' %}?page=${page}&class=${classId}&date=${date}&status=${status}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(r => r.json())
            .then(data => {
                window.renderAttendanceData(data.attendance);
                window.renderAttendancePagination(data.total_pages, data.current_page);
            })
            .catch(err => {
                console.error('Error loading attendance:', err);
                AdminUtils.Toast.show('{% trans "Xatolik yuz berdi!"|escapejs %}', 'error');
            });
    }

    window.renderAttendanceData = function(attendance) {
        const tbody = document.getElementById('attendanceTableBody');
        if (!attendance || attendance.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5"><p class="text-muted">{% trans "Davomat ma\'lumotlari topilmadi"|escapejs %}</p></td></tr>';
            return;
        }

        tbody.innerHTML = attendance.map(a => `
        <tr>
            <td><strong>${a.student}</strong></td>
            <td>${a.class}</td>
            <td>${a.date}</td>
            <td><span class="badge ${getStatusBadge(a.status)}">${getStatusText(a.status)}</span></td>
            <td>
                <select class="form-select form-select-sm" onchange="window.updateAttendance(${a.id}, this.value)">
                    <option value="present" ${a.status === 'present' ? 'selected' : ''}>{% trans "Kelgan"|escapejs %}</option>
                    <option value="absent" ${a.status === 'absent' ? 'selected' : ''}>{% trans "Kelmagan"|escapejs %}</option>
                    <option value="late" ${a.status === 'late' ? 'selected' : ''}>{% trans "Kechikkan"|escapejs %}</option>
                </select>
            </td>
        </tr>
    `).join('');
    }

    window.renderAttendancePagination = function(totalPages, currentPage) {
        const container = document.getElementById('attendancePagination');
        if (!container || totalPages <= 1) {
            if (container) container.innerHTML = '';
            return;
        }

        let html = '';
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline-primary'} ms-1" onclick="window.loadAttendance(${i})">${i}</button>`;
        }
        container.innerHTML = html;
    }


    // Add event listeners for filters
    document.getElementById('attendanceClassFilter')?.addEventListener('change', () => window.loadAttendance(1));
    document.getElementById('attendanceDateFilter')?.addEventListener('change', () => window.loadAttendance(1));
    document.getElementById('attendanceStatusFilter')?.addEventListener('change', () => window.loadAttendance(1));

    function getStatusBadge(status) {
        return {
            'present': 'bg-success',
            'absent': 'bg-danger',
            'late': 'bg-warning'
        }[status] || 'bg-secondary';
    }

    function getStatusText(status) {
        return {
            'present': '{% trans "Kelgan"|escapejs %}',
            'absent': '{% trans "Kelmagan"|escapejs %}',
            'late': '{% trans "Kechikkan"|escapejs %}'
        }[status] || status;
    }

    window.updateAttendance = function(id, status) {
        fetch(`/administration/attendance/${id}/update/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': AdminUtils.csrftoken
            },
            body: `status=${status}`
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    AdminUtils.Toast.show('{% trans "Davomat yangilandi!"|escapejs %}', 'success');
                    loadAttendance();
                }
            });
    }

    function exportAttendance() {
        const classId = document.getElementById('attendanceClassFilter')?.value || '';
        if (!classId) {
            AdminUtils.Toast.show('{% trans "Sinfni tanlang!"|escapejs %}', 'warning');
            return;
        }
        window.location.href = `{% url 'export_attendance' %}?class_id=${classId}`;
    }
</script>
