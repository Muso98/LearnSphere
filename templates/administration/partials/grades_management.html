{% load i18n %}
<!-- Grades Management Partial -->

<div class="management-header">
    <h3 class="management-title"><i class="bi bi-mortarboard me-2"></i>{% trans "Baholar Boshqaruvi" %}</h3>
    <button class="btn btn-action btn-action-success" onclick="exportGrades()">
        <i class="bi bi-download"></i> {% trans "Excel ga eksport" %}
    </button>
</div>

<!-- Filter Panel -->
<div class="filter-panel">
    <div class="row g-3">
        <div class="col-md-3">
            <input type="text" id="studentSearch" class="form-control" placeholder="{% trans 'O\'quvchi ismi...' %}">
        </div>
        <div class="col-md-3">
            <select id="gradeClassFilter" class="form-select">
                <option value="">{% trans "Barcha sinflar" %}</option>
            </select>
        </div>
        <div class="col-md-3">
            <select id="gradeSubjectFilter" class="form-select">
                <option value="">{% trans "Barcha fanlar" %}</option>
            </select>
        </div>
        <div class="col-md-3">
            <input type="date" id="gradeDateFilter" class="form-control">
        </div>
    </div>
</div>

<!-- Grades Table -->
<div class="modern-table">
    <table class="table">
        <thead>
            <tr>
                <th>{% trans "O'quvchi" %}</th>
                <th>{% trans "Fan" %}</th>
                <th>{% trans "O'qituvchi" %}</th>
                <th>{% trans "Baho" %}</th>
                <th>{% trans "Sana" %}</th>
                <th style="width: 100px;">{% trans "Harakatlar" %}</th>
            </tr>
        </thead>
        <tbody id="gradesTableBody">
            <tr>
                <td colspan="6" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">{% trans "Yuklanmoqda..." %}</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<nav id="gradesPagination" class="pagination-modern mt-3"></nav>

<script>
    window.loadGrades = function(page = 1) {
        const student = document.getElementById('studentSearch')?.value || '';
        const classId = document.getElementById('gradeClassFilter')?.value || '';
        const subjectId = document.getElementById('gradeSubjectFilter')?.value || '';
        const date = document.getElementById('gradeDateFilter')?.value || '';

        fetch(`{% url 'grade_list' %}?page=${page}&student=${student}&class=${classId}&subject=${subjectId}&date=${date}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(r => r.json())
            .then(data => {
                window.renderGradesData(data.grades);
                window.renderGradesPagination(data.total_pages, data.current_page);
            })
            .catch(err => {
                console.error('Error loading grades:', err);
                AdminUtils.Toast.show('{% trans "Xatolik yuz berdi!"|escapejs %}', 'error');
            });
    }

    window.renderGradesData = function(grades) {
        const tbody = document.getElementById('gradesTableBody');
        if (!grades || grades.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5"><p class="text-muted">{% trans "Baholar topilmadi" %}</p></td></tr>';
            return;
        }

        tbody.innerHTML = grades.map(g => `
        <tr>
            <td><strong>${g.student}</strong></td>
            <td>${g.subject}</td>
            <td>${g.teacher}</td>
            <td><span class="badge ${g.grade >= 4 ? 'bg-success' : g.grade >= 3 ? 'bg-warning' : 'bg-danger'} rounded-pill px-3">${g.grade}</span></td>
            <td>${g.date}</td>
            <td>
                <button onclick="window.deleteGrade(${g.id})" class="btn btn-sm btn-danger" title="O'chirish">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
    }

    window.renderGradesPagination = function(totalPages, currentPage) {
        const container = document.getElementById('gradesPagination');
        if (!container || totalPages <= 1) {
            if (container) container.innerHTML = '';
            return;
        }

        let html = '';
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline-primary'} ms-1" onclick="window.loadGrades(${i})">${i}</button>`;
        }
        container.innerHTML = html;
    }

    // Initialize on tab show
    document.getElementById('grades-tab')?.addEventListener('shown.bs.tab', function () {
        if (!window.gradesLoaded) {
            window.loadGrades();
            window.gradesLoaded = true;
            
            // Populate filters if not done
            const classSelect = document.getElementById('gradeClassFilter');
            const subjectSelect = document.getElementById('gradeSubjectFilter');
            
            if (classSelect && classSelect.options.length <= 1) {
                // Populate from existing data or another fetch
                {% for cls in classes %}
                classSelect.add(new Option('{{ cls.name }}', '{{ cls.id }}'));
                {% endfor %}
            }
            if (subjectSelect && subjectSelect.options.length <= 1) {
                {% for subj in subjects %}
                subjectSelect.add(new Option('{{ subj.name }}', '{{ subj.id }}'));
                {% endfor %}
            }
        }
    });

    // Add event listeners for filters
    document.getElementById('studentSearch')?.addEventListener('input', () => window.loadGrades(1));
    document.getElementById('gradeClassFilter')?.addEventListener('change', () => window.loadGrades(1));
    document.getElementById('gradeSubjectFilter')?.addEventListener('change', () => window.loadGrades(1));
    document.getElementById('gradeDateFilter')?.addEventListener('change', () => window.loadGrades(1));

    window.deleteGrade = function(id) {
        if (!confirm('{% trans "Bahoni o\'chirishga ishonchingiz komilmi?"|escapejs %}')) return;

        fetch(`/administration/grades/${id}/delete/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': AdminUtils.csrftoken }
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    AdminUtils.Toast.show('{% trans "Baho o\'chirildi!"|escapejs %}', 'success');
                    loadGrades();
                }
            });
    }

    function exportGrades() {
        const classId = document.getElementById('gradeClassFilter')?.value || '';
        const subjectId = document.getElementById('gradeSubjectFilter')?.value || '';
        if (!classId || !subjectId) {
            AdminUtils.Toast.show('{% trans "Sinf va fanni tanlang!"|escapejs %}', 'warning');
            return;
        }
        window.location.href = `{% url 'export_grades' %}?class_id=${classId}&subject_id=${subjectId}`;
    }
</script>
