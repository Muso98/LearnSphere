{% load i18n %}
<!-- Subjects Management Partial -->

<div class="management-header">
    <h3 class="management-title"><i class="bi bi-book me-2"></i>{% trans "Fanlar Boshqaruvi" %}</h3>
    <a href="{% url 'subject_create' %}" class="btn btn-action btn-action-primary">
        <i class="bi bi-plus-circle"></i> {% trans "Yangi Fan" %}
    </a>
</div>

<!-- Subjects Table -->
<div class="modern-table">
    <table class="table">
        <thead>
            <tr>
                <th>{% trans "Fan nomi" %}</th>
                <th>{% trans "O'qituvchilar soni" %}</th>
                <th style="width: 200px;">{% trans "Harakatlar" %}</th>
            </tr>
        </thead>
        <tbody id="subjectsTableBody">
            <tr>
                <td colspan="3" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">{% trans "Yuklanmoqda..." %}</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    window.loadSubjects = function() {
        fetch('{% url "subject_list" %}', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(r => r.json())
            .then(data => {
                window.renderSubjectsData(data.subjects);
            })
            .catch(err => {
                console.error('Error loading subjects:', err);
                AdminUtils.Toast.show('{% trans "Xatolik yuz berdi!"|escapejs %}', 'error');
            });
    }

    window.renderSubjectsData = function(subjects) {
        const tbody = document.getElementById('subjectsTableBody');
        if (!subjects || subjects.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-5"><p class="text-muted">{% trans "Fanlar topilmadi" %}</p></td></tr>';
            return;
        }

        tbody.innerHTML = subjects.map(subj => `
        <tr>
            <td><strong>${subj.name}</strong></td>
            <td><span class="badge bg-primary">${subj.teacher_count} {% trans "o'qituvchi" %}</span></td>
            <td class="table-actions">
                <a href="/administration/subjects/${subj.id}/update/" class="btn btn-sm btn-warning">
                    <i class="bi bi-pencil"></i> {% trans "Tahrirlash" %}
                </a>
                <button onclick="window.deleteSubject(${subj.id}, '${subj.name}')" class="btn btn-sm btn-danger">
                    <i class="bi bi-trash"></i> {% trans "O'chirish" %}
                </button>
            </td>
        </tr>
    `).join('');
    }

    // Initialize on tab show
    document.getElementById('subjects-tab')?.addEventListener('shown.bs.tab', function () {
        if (!window.subjectsLoaded) {
            window.loadSubjects();
            window.subjectsLoaded = true;
        }
    });

    window.deleteSubject = function(id, name) {
        if (!confirm(`${name} {% trans "fanini o'chirishga ishonchingiz komilmi?"|escapejs %}`)) return;

        fetch(`/administration/subjects/${id}/delete/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': AdminUtils.csrftoken }
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    AdminUtils.Toast.show('{% trans "Fan o\'chirildi!"|escapejs %}', 'success');
                    loadSubjects();
                } else {
                    AdminUtils.Toast.show(data.message || '{% trans "Xatolik!"|escapejs %}', 'error');
                }
            });
    }
</script>
