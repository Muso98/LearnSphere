{% load i18n %}
<!-- Classes Management Partial -->

<div class="management-header">
    <h3 class="management-title"><i class="bi bi-building me-2"></i>{% trans "Sinflar Boshqaruvi" %}</h3>
    <a href="{% url 'class_create' %}" class="btn btn-action btn-action-primary">
        <i class="bi bi-plus-circle"></i> {% trans "Yangi Sinf" %}
    </a>
</div>

<!-- Classes Grid -->
<div class="row g-4" id="classesGrid">
    <div class="col-12">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">{% trans "Yuklanmoqda..." %}</p>
        </div>
    </div>
</div>

<script>
    window.loadClasses = function() {
        fetch('{% url "class_list" %}', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(r => r.json())
            .then(data => {
                window.renderClassesData(data.classes);
            })
            .catch(err => {
                console.error('Error loading classes:', err);
                AdminUtils.Toast.show('{% trans "Xatolik yuz berdi!" %}', 'error');
            });
    }

    window.renderClassesData = function(classes) {
        const grid = document.getElementById('classesGrid');
        if (!classes || classes.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted">{% trans "Sinflar topilmadi" %}</p></div>';
            return;
        }

        grid.innerHTML = classes.map(cls => `
        <div class="col-md-4">
            <div class="glass-card p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h4 class="fw-bold mb-1">${cls.name}</h4>
                        <small class="text-muted">${cls.school}</small>
                    </div>
                    <span class="badge bg-primary rounded-pill">${cls.student_count} {% trans "o'quvchi" %}</span>
                </div>
                <div class="d-flex gap-2">
                    <a href="/administration/classes/${cls.id}/students/" class="btn btn-sm btn-info flex-fill">
                        <i class="bi bi-people"></i> {% trans "O'quvchilar" %}
                    </a>
                    <a href="/administration/classes/${cls.id}/update/" class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <button onclick="window.deleteClass(${cls.id}, '${cls.name}')" class="btn btn-sm btn-danger">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    `).join('');
    }

    // Initialize on tab show
    document.getElementById('classes-tab')?.addEventListener('shown.bs.tab', function () {
        if (!window.classesLoaded) {
            window.loadClasses();
            window.classesLoaded = true;
        }
    });

    window.deleteClass = function(id, name) {
        if (!confirm(`${name} {% trans "sinfni o'chirishga ishonchingiz komilmi?" %}`)) return;

        fetch(`/administration/classes/${id}/delete/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': AdminUtils.csrftoken }
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    AdminUtils.Toast.show('{% trans "Sinf o\'chirildi!" %}', 'success');
                    loadClasses();
                } else {
                    AdminUtils.Toast.show(data.message || '{% trans "Xatolik!" %}', 'error');
                }
            });
    }
</script>
