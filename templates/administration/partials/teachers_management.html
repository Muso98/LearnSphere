{% load i18n %}
<!-- Teachers Management Partial -->

<div class="management-header">
    <h3 class="management-title"><i class="bi bi-person-badge me-2"></i>{% trans "O'qituvchilarni Boshqarish" %}</h3>
    <button type="button" class="btn btn-action btn-action-primary" onclick="window.showAssignmentModal()">
        <i class="bi bi-plus-circle"></i> {% trans "Yangi Tayinlash" %}
    </button>
</div>

<!-- Teacher Assignment Modal -->
<div class="modal fade" id="assignmentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h5 class="modal-title">{% trans "O'qituvchini Biriktirish" %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="assignmentForm">
                    <div class="mb-3">
                        <label class="form-label">{% trans "O'qituvchi" %}</label>
                        <select name="teacher" class="form-select" required>
                            <option value="">{% trans "Tanlang" %}...</option>
                            {% for teacher in teachers %}
                            <option value="{{ teacher.id }}">{{ teacher.get_full_name }} ({{ teacher.username }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{% trans "Fan" %}</label>
                        <select name="subject" class="form-select" required>
                            <option value="">{% trans "Tanlang" %}...</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.id }}">{{ subject.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{% trans "Sinf" %}</label>
                        <select name="assigned_class" class="form-select" required>
                            <option value="">{% trans "Tanlang" %}...</option>
                            {% for cls in classes %}
                            <option value="{{ cls.id }}">{{ cls.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">{% trans "Bekor qilish" %}</button>
                <button type="button" class="btn btn-primary rounded-pill px-4" onclick="window.saveAssignment()">{% trans "Saqlash" %}</button>
            </div>
        </div>
    </div>
</div>

<!-- Search -->
<div class="filter-panel">
    <div class="row g-3">
        <div class="col-md-6">
            <input type="text" id="teacherSearch" class="form-control" placeholder="{% trans 'O\'qituvchi qidirish...' %}">
        </div>
        <div class="col-md-3">
            <select id="teacherSubjectFilter" class="form-select">
                <option value="">{% trans "Barcha fanlar" %}</option>
                {% for subject in subjects %}
                <option value="{{ subject.id }}">{{ subject.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <select id="teacherClassFilter" class="form-select">
                <option value="">{% trans "Barcha sinflar" %}</option>
                {% for class in classes %}
                <option value="{{ class.id }}">{{ class.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
</div>

<!-- Assignments Table -->
<div class="modern-table">
    <table class="table">
        <thead>
            <tr>
                <th>{% trans "O'qituvchi" %}</th>
                <th>{% trans "Fan" %}</th>
                <th>{% trans "Sinf" %}</th>
                <th>{% trans "Tayinlangan sana" %}</th>
                <th style="width: 100px;">{% trans "Harakatlar" %}</th>
            </tr>
        </thead>
        <tbody id="teachersTableBody">
            <tr>
                <td colspan="5" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">{% trans "Yuklanmoqda..." %}</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    window.loadTeacherAssignments = function() {
        const tbody = document.getElementById('teachersTableBody');
        if (!tbody) return;

        const search = document.getElementById('teacherSearch')?.value || '';
        const subject = document.getElementById('teacherSubjectFilter')?.value || '';
        const cls = document.getElementById('teacherClassFilter')?.value || '';

        fetch(`{% url 'teacher_assignment' %}?search=${search}&subject=${subject}&class=${cls}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(r => r.json())
            .then(data => {
                if (!data.assignments || data.assignments.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted">{% trans "Tayinlovlar mavjud emas"|escapejs %}</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.assignments.map(a => `
                    <tr>
                        <td><strong>${a.teacher}</strong></td>
                        <td><span class="badge bg-primary">${a.subject}</span></td>
                        <td><span class="badge bg-info">${a.class}</span></td>
                        <td>${a.created_at}</td>
                        <td>
                            <button onclick="deleteAssignment(${a.id})" class="btn btn-sm btn-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            })
            .catch(err => {
                console.error('Error loading teachers:', err);
                AdminUtils.Toast.show('{% trans "Xatolik yuz berdi!"|escapejs %}', 'error');
            });
    }

    // Filters event listeners
    document.getElementById('teacherSearch')?.addEventListener('input', AdminUtils.debounce(() => window.loadTeacherAssignments(), 500));
    document.getElementById('teacherSubjectFilter')?.addEventListener('change', () => window.loadTeacherAssignments());
    document.getElementById('teacherClassFilter')?.addEventListener('change', () => window.loadTeacherAssignments());

    window.deleteAssignment = function(id) {
        if (!confirm('{% trans "Tayinlashni bekor qilishga ishonchingiz komilmi?"|escapejs %}')) return;

        let url = "{% url 'teacher_assignment_delete' 0 %}".replace('0', id);
        fetch(url, {
            method: 'POST',
            headers: { 'X-CSRFToken': AdminUtils.csrftoken }
        })
            .then(r => r.json())
            .then(data => {
                if (data.success || !data.error) {
                    AdminUtils.Toast.show('{% trans "Tayinlash bekor qilindi!"|escapejs %}', 'success');
                    window.loadTeacherAssignments();
                }
            })
            .catch(() => {
                window.loadTeacherAssignments();
            });
    }

    let assignmentModal;
    window.showAssignmentModal = function() {
        if (!assignmentModal) {
            assignmentModal = new bootstrap.Modal(document.getElementById('assignmentModal'));
        }
        document.getElementById('assignmentForm').reset();
        assignmentModal.show();
    }

    window.saveAssignment = function() {
        const form = document.getElementById('assignmentForm');
        const formData = new FormData(form);

        fetch('{% url "teacher_assignment" %}', {
            method: 'POST',
            headers: {
                'X-CSRFToken': AdminUtils.csrftoken,
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: formData
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    AdminUtils.Toast.show(data.message || '{% trans "Muvaffaqiyatli biriktirildi!"|escapejs %}', 'success');
                    assignmentModal.hide();
                    window.loadTeacherAssignments();
                } else {
                    AdminUtils.Toast.show(data.message || '{% trans "Xatolik yuz berdi!"|escapejs %}', 'error');
                }
            })
            .catch(err => {
                console.error('Save error:', err);
                AdminUtils.Toast.show('{% trans "Tarmoq xatosi!"|escapejs %}', 'error');
            });
    }
</script>
